<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/styles/style.css">
    <link rel="shortcut icon" href="/img/favicon.png" type="image/x-icon">
    <title>Carrito Choleley</title>
</head>
<body>
    <div class="wrapper">
        <aside>
            <header>
                <a href="/index.html"><img class="logo" src="./img/logo1.png" alt="Logo choleley"> </a>
            </header>
            <nav>
                <ul>
                    <li>
                        <a class="botonMenu botonVolver" href="index.html">
                            <i class="bi bi-arrow-left-circle-fill"></i></i> Seguir comprando</a>
                    </li>
                    <li>
                        <a class="botonMenu botonCarrito active" href="carrito.html">
                            <i class="bi bi-cart-fill"></i> Carrito </a>
                    </li>
                </ul>
            </nav>
            <footer>
                <p class="textoFooter">© 2026 Choleley</p>
            </footer>
        </aside>
        <main>
            <h2 class="tituloPrincipal">Carrito</h2>
            <div class="contenedorCarrito">
                <p class="carritoVacio">Tu carrtio esta vacio <i class="bi bi-emoji-frown"></i></p>
                <div class="carritoProductos">
                    <div class="carritoProducto">
                        <img class="carritoProductoImg" src="/img/gorra.png" alt="Gorra personalizada">
                        <div class="carritoProductoTitulo">
                            <small>Titulo</small>
                            <h3>Gorra</h3>
                        </div>
                        <div class="carritoProductoCantidad">
                            <small>Cantidad</small>
                            <p>1</p>
                        </div>
                        <div class="carritoProductoPrecio">
                                <small>Precio</small>
                                <p>$15000</p>
                        </div>
                        <div class="carritoProductoSubtotal">
                                <small>Subtotal</small>
                                <p>$15000</p>
                        </div>
                            <button class="carritoProductoEliminar"><i class="bi bi-trash3-fill"></i> </button>
                    </div>

                    <div class="carritoProducto">
                        <img class="carritoProductoImg" src="/img/remera.png" alt="Remera personalizada">
                        <div class="carritoProductoTitulo">
                            <small>Titulo</small>
                            <h3>Remera</h3>
                        </div>
                        <div class="carritoProductoCantidad">
                            <small>Cantidad</small>
                            <p>1</p>
                        </div>
                            <div class="carritoProductoPrecio">
                                <small>Precio</small>
                                <p>$35000</p>
                            </div>
                            <div class="carritoProductoSubtotal">
                                <small>Subtotal</small>
                                <p>$35000</p>
                            </div>
                            <button class="carritoProductoEliminar"><i class="bi bi-trash3-fill"></i> </button>
                    </div>
                </div>
                    <div class="carritoAcciones">
                        <div class="carritoAccionesIzquierda">
                            <button class="carritoAccionesVaciar">Vaciar carrito </button>
                        </div>
                        <div class="carrtioAccionesDerecha">
                            <div class="carritoAccionesTotal">
                                <p>Total:</p>
                                <p id="total">$3000</p>
                            </div>
                            <button class="CarritoAccionesComprar">Comprar Ahora</button>
                        </div>
                    </div>
            </div>
        </main>
    </div>
    
</body>
</html>
